<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Business</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">SHIV DURGA BHANDAR</div>
        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#products">Products</a></li>
          <li><a href="#contact">Contact</a></li>
          <li><a href="#" id="buyLink">Buy</a></li>
        </ul>
        <button class="nav-toggle">☰</button>
      </nav>
    </header>
    <div id="top"></div>
    <section id="products" class="products">
      <h2>Our Products</h2>
      <div class="product-list">
        <div class="product-item">
          <img src="About-pulses-for-kids.webp" alt="Masoor Dal" />
          <h3>Masoor Dal</h3>
          <p>
            High quality, protein-rich Masoor Dal for all your nutritional needs.
          </p>
        </div>
        <div class="product-item">
          <img src="img_58861-e1537537988102.jpg" alt="toor Dal" />
          <h3>toor Dal</h3>
          <p>Fresh toor dal perfect for soups and stews.</p>
        </div>
        <div class="product-item">
          <img src="Image-Pulses.jpg" alt="Masoor Dal" />
          <h3>Masoor Dal</h3>
          <p>Clean and peeled masoor dal for healthy meals.</p>
        </div>
      </div>
    </section>

    <!-- Buy Modal -->
    <div id="buyModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Order Now</h2>
        <form id="buyForm" method="post" action="/buy">
          <label for="orderDate">Date of Purchase:</label>
          <input type="date" id="orderDate" name="orderDate" required />

          <label for="buyerName">Name:</label>
          <input type="text" id="buyerName" name="buyerName" required />

          <label for="productName">Product Name:</label>
          <select id="productName" name="productName" required>
            <option value="">Select a product</option>
            <option value="Chickpeas">Chickpeas</option>
            <option value="Toor Dal">Toor Dal</option>
            <option value="Masoor Dal">Masoor Dal</option>
          </select>

          <label for="quantity">Quantity (kg):</label>
          <input
            type="number"
            id="quantity"
            name="quantity"
            min="1"
            step="0.5"
            required
          />

          <label for="address">Address:</label>
          <textarea id="address" name="address" rows="3" required></textarea>

          <button type="submit">Place Order</button>
        </form>
        <div id="buyResponse"></div>
      </div>
    </div>

    <section id="contact" class="contact">
      <h2>Contact Us</h2>
      <form id="contactForm" method="post" action="/contact">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">Send</button>
      </form>
      <div id="response"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
